background-size:cover;background-position:bottom center;}
body::after{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse at 50% 50%,transparent 30%,rgba(0,0,0,.65) 100%);}

/* ── MAIN WRAP ── */
.main-wrap{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:clamp(20px,4vh,40px);padding:20px;width:100%;}

/* ── BIG BUTTON ── */
.btn-outer-ring{position:relative;width:min(280px,72vw);height:min(280px,72vw);border-radius:50%;background:radial-gradient(circle at 40% 35%,#888 0%,#555 30%,#333 60%,#1a1a1a 100%);box-shadow:0 12px 40px rgba(0,0,0,.9),inset 0 2px 4px rgba(255,255,255,.15),inset 0 -4px 12px rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;cursor:pointer;animation:outerPulse 2s ease-in-out infinite;transition:transform .1s;-webkit-user-select:none;user-select:none;}
.btn-outer-ring:active{transform:scale(.97);}
@keyframes outerPulse{0%,100%{box-shadow:0 12px 40px rgba(0,0,0,.9),inset 0 2px 4px rgba(255,255,255,.15),inset 0 -4px 12px rgba(0,0,0,.8),0 0 30px rgba(255,30,30,.4),0 0 70px rgba(255,0,0,.2);}50%{box-shadow:0 12px 40px rgba(0,0,0,.9),inset 0 2px 4px rgba(255,255,255,.15),inset 0 -4px 12px rgba(0,0,0,.8),0 0 55px rgba(255,50,50,.8),0 0 110px rgba(255,0,0,.45);}}
.btn-base{width:82%;height:82%;border-radius:50%;background:radial-gradient(circle at 40% 35%,#cc1100 0%,#990000 40%,#660000 75%,#3a0000 100%);box-shadow:0 8px 30px rgba(0,0,0,.8),inset 0 -6px 20px rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;}
.btn-dome{width:87%;height:87%;border-radius:50%;position:relative;background:radial-gradient(circle at 38% 30%,rgba(255,180,180,.55) 0%,transparent 40%),radial-gradient(circle at 50% 50%,#ff2200 0%,#cc0000 35%,#990000 60%,#5a0000 100%);box-shadow:inset 0 -8px 25px rgba(0,0,0,.5),inset 0 8px 20px rgba(255,100,80,.3);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.btn-dome::before{content:'';position:absolute;top:18%;left:22%;width:42%;height:28%;background:radial-gradient(ellipse,rgba(255,255,255,.55) 0%,transparent 100%);border-radius:50%;transform:rotate(-20deg);pointer-events:none;}
.gun-silhouette{position:relative;z-index:5;filter:drop-shadow(0 0 6px rgba(0,0,0,.9));}
.gun-silhouette svg{width:min(130px,33vw);height:auto;}

/* ── LCD ── */
.lcd{background:#060d06;border:3px solid #1e3a1e;border-radius:6px;padding:14px clamp(12px,4vw,30px);position:relative;box-shadow:0 0 24px rgba(0,255,0,.3),inset 0 0 30px rgba(0,0,0,.85);max-width:95vw;}
.lcd::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.28) 3px,rgba(0,0,0,.28) 4px);border-radius:4px;pointer-events:none;}
.lcd-txt{font-family:'Share Tech Mono',monospace;font-size:clamp(.7rem,3.2vw,1.05rem);color:#00ff41;text-shadow:0 0 8px #00ff41,0 0 16px #00cc33;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;animation:lcdb 3s ease-in-out infinite;}
@keyframes lcdb{0%,88%,100%{opacity:1}93%{opacity:.6}}

/* ── MISSION OVERLAY ── */
#msn{position:fixed;inset:0;background:#000;z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;overflow-y:auto;overflow-x:hidden;gap:clamp(16px,3vh,28px);padding:20px;}
#msn.on{display:flex;}
.lzr-box{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
@keyframes lzrScan{0%{left:-115%;opacity:0}4%{opacity:1}96%{opacity:1}100%{left:115%;opacity:0}}
.m-lcd{position:relative;z-index:20;background:#040b04;border:3px solid #173017;border-radius:8px;padding:clamp(16px,4vw,28px) clamp(16px,5vw,42px);text-align:center;width:min(520px,92vw);box-shadow:0 0 50px rgba(0,255,0,.45),inset 0 0 40px rgba(0,0,0,.92);animation:mLcdIn .5s ease .7s both;}
@keyframes mLcdIn{from{opacity:0;transform:scale(.82)}to{opacity:1;transform:scale(1)}}
.m-lcd::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.32) 3px,rgba(0,0,0,.32) 4px);border-radius:6px;pointer-events:none;}
.m-label{font-family:'Share Tech Mono',monospace;font-size:clamp(.5rem,2vw,.6rem);color:rgba(0,200,0,.45);letter-spacing:3px;margin-bottom:12px;text-transform:uppercase;}
.m-txt{font-family:'Orbitron',monospace;font-size:clamp(.9rem,4vw,1.3rem);color:#00ff41;text-shadow:0 0 10px #00ff41,0 0 22px #00cc33;letter-spacing:1px;line-height:1.9;text-transform:uppercase;}
.m-txt span{display:block;}
.cur{display:inline-block;width:10px;height:1.1em;background:#00ff41;vertical-align:middle;animation:cb .8s step-end infinite;box-shadow:0 0 8px #00ff41;}
@keyframes cb{50%{opacity:0}}

/* ── SMALL NEXT BUTTON ── */
#missionNextBtn{display:none;position:relative;z-index:20;cursor:pointer;align-items:center;flex-direction:column;-webkit-user-select:none;user-select:none;}
@keyframes btnAppear{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
#missionNextBtn.show{display:flex;animation:btnAppear .4s ease both;}
.mini-outer{width:90px;height:90px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#888 0%,#555 30%,#333 60%,#1a1a1a 100%);box-shadow:0 4px 15px rgba(0,0,0,.9),inset 0 1px 3px rgba(255,255,255,.15),0 0 20px rgba(255,30,30,.5),0 0 50px rgba(255,0,0,.25);display:flex;align-items:center;justify-content:center;animation:miniPulse 1.5s ease-in-out infinite;transition:transform .1s;}
.mini-outer:active{transform:scale(.94);}
@keyframes miniPulse{0%,100%{box-shadow:0 4px 15px rgba(0,0,0,.9),inset 0 1px 3px rgba(255,255,255,.15),0 0 18px rgba(255,30,30,.5),0 0 45px rgba(255,0,0,.25);}50%{box-shadow:0 4px 15px rgba(0,0,0,.9),inset 0 1px 3px rgba(255,255,255,.15),0 0 35px rgba(255,50,50,.9),0 0 80px rgba(255,0,0,.5);}}
.mini-base{width:72px;height:72px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#cc1100 0%,#990000 45%,#4a0000 100%);display:flex;align-items:center;justify-content:center;}
.mini-dome{width:60px;height:60px;border-radius:50%;position:relative;overflow:hidden;background:radial-gradient(circle at 38% 30%,rgba(255,180,180,.5) 0%,transparent 38%),radial-gradient(circle at 50% 50%,#ff2200 0%,#cc0000 40%,#880000 100%);display:flex;align-items:center;justify-content:center;}
.mini-dome::before{content:'';position:absolute;top:18%;left:20%;width:40%;height:26%;background:radial-gradient(ellipse,rgba(255,255,255,.5) 0%,transparent 100%);border-radius:50%;transform:rotate(-20deg);}
.mini-dome svg{width:40px;height:auto;position:relative;z-index:2;filter:drop-shadow(0 0 3px rgba(0,0,0,.9));}
.mini-label{font-family:'Orbitron',monospace;font-size:.5rem;letter-spacing:3px;color:rgba(255,180,160,.5);text-transform:uppercase;margin-top:6px;text-align:center;}

/* ── ESC BUTTON ── */
.esc{position:absolute;top:18px;right:18px;z-index:30;font-family:'Share Tech Mono',monospace;font-size:.7rem;color:rgba(255,255,255,.25);cursor:pointer;letter-spacing:2px;padding:8px;-webkit-user-select:none;user-select:none;}

/* ── CODENAME PAGE ── */
#codePage{position:fixed;inset:0;background:#000;z-index:300;display:none;flex-direction:column;align-items:center;justify-content:safe center;overflow-y:auto;overflow-x:hidden;gap:clamp(14px,2.5vh,24px);padding:clamp(20px,4vh,40px) 20px;}
#codePage.on{display:flex;}
#codePage .lzr-box2{position:fixed;inset:0;pointer-events:none;overflow:hidden;}
.code-lcd{position:relative;z-index:20;background:#040b04;border:3px solid #173017;border-radius:8px;padding:clamp(16px,4vw,24px) clamp(16px,5vw,36px);text-align:center;width:min(520px,92vw);box-shadow:0 0 50px rgba(0,255,0,.45),inset 0 0 40px rgba(0,0,0,.92);}
.code-lcd::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.32) 3px,rgba(0,0,0,.32) 4px);border-radius:6px;pointer-events:none;}
.code-label{font-family:'Share Tech Mono',monospace;font-size:clamp(.55rem,2vw,.75rem);color:rgba(0,200,0,.4);letter-spacing:4px;margin-bottom:12px;text-transform:uppercase;}
.code-instr{font-family:'Orbitron',monospace;font-size:clamp(.95rem,3.5vw,1.3rem);color:#00ff41;text-shadow:0 0 8px #00ff41,0 0 18px #00cc33;letter-spacing:1px;line-height:1.8;text-transform:uppercase;margin-bottom:20px;}
.name-row{display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap;}
#nameInput{background:#010d01;border:2px solid #00aa33;border-radius:4px;padding:12px 14px;font-family:'Share Tech Mono',monospace;font-size:clamp(1rem,4vw,1.2rem);color:#00ff41;letter-spacing:2px;outline:none;width:min(200px,55vw);text-transform:uppercase;caret-color:#00ff41;box-shadow:0 0 12px rgba(0,255,0,.2),inset 0 0 10px rgba(0,0,0,.8);-webkit-appearance:none;appearance:none;border-radius:4px;}
#nameInput:focus{border-color:#00ff41;}
#nameInput::placeholder{color:rgba(0,180,0,.3);}
.inp-btn-wrap{cursor:pointer;transition:transform .1s;-webkit-user-select:none;user-select:none;}
.inp-btn-wrap:active{transform:scale(.93);}
.inp-outer{width:64px;height:64px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#777 0%,#444 30%,#222 70%,#111 100%);box-shadow:0 3px 12px rgba(0,0,0,.9),inset 0 1px 2px rgba(255,255,255,.12),0 0 18px rgba(255,20,20,.5);display:flex;align-items:center;justify-content:center;animation:miniPulse 1.5s ease-in-out infinite;}
.inp-base{width:52px;height:52px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#cc1100 0%,#990000 45%,#4a0000 100%);display:flex;align-items:center;justify-content:center;}
.inp-dome{width:42px;height:42px;border-radius:50%;overflow:hidden;position:relative;background:radial-gradient(circle at 38% 30%,rgba(255,180,180,.5) 0%,transparent 38%),radial-gradient(circle at 50% 50%,#ff2200 0%,#cc0000 40%,#880000 100%);display:flex;align-items:center;justify-content:center;}
.inp-dome::before{content:'';position:absolute;top:18%;left:20%;width:40%;height:26%;background:radial-gradient(ellipse,rgba(255,255,255,.5) 0%,transparent 100%);border-radius:50%;transform:rotate(-20deg);}
.inp-dome svg{width:28px;position:relative;z-index:2;filter:drop-shadow(0 0 2px rgba(0,0,0,.9));}

/* ── REVEAL BOX ── fullscreen fixed overlay, scrollable */
#revealBox{display:none;position:fixed;inset:0;z-index:350;background:#000;overflow-y:auto;overflow-x:hidden;flex-direction:column;align-items:center;justify-content:safe center;padding:clamp(24px,5vw,48px) clamp(16px,5vw,40px);}
#revealBox::before{content:'';position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.18) 3px,rgba(0,0,0,.18) 4px);z-index:1;}
.rev-inner{position:relative;z-index:2;width:min(520px,92vw);background:#040b04;border:3px solid #00aa22;border-radius:8px;padding:clamp(20px,4vw,32px) clamp(16px,5vw,40px);text-align:center;box-shadow:0 0 60px rgba(0,255,0,.6),inset 0 0 30px rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;}
.rev-label{font-family:'Share Tech Mono',monospace;font-size:clamp(.55rem,2vw,.75rem);color:rgba(0,200,0,.4);letter-spacing:4px;margin-bottom:14px;text-transform:uppercase;}
.rev-greeting{font-family:'Orbitron',monospace;font-size:clamp(1.2rem,5vw,1.8rem);color:#00ff41;text-shadow:0 0 12px #00ff41,0 0 28px #00cc33,0 0 50px rgba(0,255,65,.4);letter-spacing:2px;margin-bottom:20px;text-transform:uppercase;line-height:1.4;word-break:break-word;}
.rev-intro{font-family:'Orbitron',monospace;font-size:clamp(.9rem,3.2vw,1.2rem);color:#00ff41;text-shadow:0 0 8px #00ff41,0 0 18px #00cc33;letter-spacing:1px;margin-bottom:14px;line-height:1.7;text-transform:uppercase;}
.rev-name{font-family:'Orbitron',monospace;font-size:clamp(.9rem,3.2vw,1.2rem);color:#00ff41;text-shadow:0 0 14px #00ff41,0 0 30px #00cc33,0 0 55px rgba(0,255,65,.5);letter-spacing:2px;text-transform:uppercase;line-height:1.6;}
.rev-sub{font-family:'Orbitron',monospace;font-size:clamp(.9rem,3.2vw,1.2rem);color:rgba(0,220,0,.65);letter-spacing:1px;margin-top:6px;text-transform:uppercase;}
.rev-destruct{font-family:'Orbitron',monospace;font-size:clamp(.9rem,3.2vw,1.2rem);color:#ff4400;text-shadow:0 0 8px #ff4400,0 0 18px rgba(255,60,0,.5);letter-spacing:1px;margin-top:16px;text-transform:uppercase;animation:destructBlink 1s ease-in-out infinite;}
@keyframes destructBlink{0%,100%{opacity:1}50%{opacity:.4}}
.rev-countdown{font-family:'Orbitron',monospace;font-size:clamp(1.8rem,7vw,2.6rem);color:#ff0000;text-shadow:0 0 10px #ff0000,0 0 25px rgba(255,0,0,.6);letter-spacing:3px;margin-top:14px;}
.rev-countdown.urgent{animation:cntUrgent .5s ease-in-out infinite;}
@keyframes cntUrgent{0%,100%{color:#ff0000;text-shadow:0 0 10px #ff0000,0 0 25px rgba(255,0,0,.6);}50%{color:#ff8888;text-shadow:0 0 20px #ff4444,0 0 45px rgba(255,0,0,.9);}}

/* ── MATRIX CANVAS ── */
#matrixCanvas{position:fixed;inset:0;z-index:999;display:none;touch-action:none;}
#matrixCanvas.on{display:block;}
</style>
</head>

<script>
// ══════════════════════════════════════════
// ── AUDIO ENGINE (Web Audio API, no files)
// ══════════════════════════════════════════
let AC = null;
function getAC() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  return AC;
}

// Unlock audio context on first user interaction (required on mobile)
function unlockAudio() {
  const ac = getAC();
  if (ac.state === 'suspended') {
    ac.resume().then(() => startHum());
  } else {
    startHum();
  }
}

// ── 0. PAGE 1 HUM — low drone pulsing with the button glow (2s cycle) ──
let humNodes = null;
function startHum() {
  if (humNodes) return; // already running
  const ac = getAC();
  const t = ac.currentTime;

  // Base drone oscillator ~60Hz
  const osc = ac.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(60, t);

  // Subtle second harmonic for body
  const osc2 = ac.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(120, t);
  const g2 = ac.createGain();
  g2.gain.setValueAtTime(0.3, t);

  // Master gain for the hum
  const masterGain = ac.createGain();
  masterGain.gain.setValueAtTime(0, t);

  // LFO to pulse gain in sync with outerPulse (2s period)
  // outerPulse: 0%,100% = dim glow → 50% = bright glow
  // We map: LFO sin wave → gain range 0.04 (dim) to 0.14 (bright)
  const lfo = ac.createOscillator();
  lfo.type = 'sine';
  lfo.frequency.setValueAtTime(0.5, t); // 1/2 Hz = 2s period

  const lfoGain = ac.createGain();
  lfoGain.gain.setValueAtTime(0.05, t); // swing ±0.05

  const lfoOffset = ac.createConstantSource();
  lfoOffset.offset.setValueAtTime(0.09, t); // centre level

  lfo.connect(lfoGain);
  lfoGain.connect(masterGain.gain);
  lfoOffset.connect(masterGain.gain);

  osc.connect(masterGain);
  osc2.connect(g2); g2.connect(masterGain);
  masterGain.connect(ac.destination);

  osc.start(t); osc2.start(t); lfo.start(t); lfoOffset.start(t);

  // Fade hum in over 1.5s
  masterGain.gain.setValueAtTime(0, t);
  // (LFO takes over after this — we prime the offset node to fade in)
  lfoOffset.offset.setValueAtTime(0, t);
  lfoOffset.offset.linearRampToValueAtTime(0.09, t + 1.5);

  humNodes = { osc, osc2, lfo, lfoOffset, lfoGain, g2, masterGain };
}

function stopHum() {
  if (!humNodes) return;
  const ac = getAC();
  const t = ac.currentTime;
  humNodes.lfoOffset.offset.setValueAtTime(humNodes.lfoOffset.offset.value, t);
  humNodes.lfoOffset.offset.linearRampToValueAtTime(0, t + 0.6);
  humNodes.lfoGain.gain.setValueAtTime(humNodes.lfoGain.gain.value, t);
  humNodes.lfoGain.gain.linearRampToValueAtTime(0, t + 0.6);
  const nodes = humNodes;
  humNodes = null;
  setTimeout(() => {
    try { nodes.osc.stop(); nodes.osc2.stop(); nodes.lfo.stop(); nodes.lfoOffset.stop(); } catch(e) {}
  }, 800);
}

// ── 1. BUTTON CLICK — chunky mechanical thunk ──
function sfxClick() {
  const ac = getAC();
  const t = ac.currentTime;

  // Low thud
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(120, t);
  osc.frequency.exponentialRampToValueAtTime(40, t + 0.08);
  gain.gain.setValueAtTime(0.7, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  osc.connect(gain); gain.connect(ac.destination);
  osc.start(t); osc.stop(t + 0.13);

  // Click transient — white noise burst
  const buf = ac.createBuffer(1, ac.sampleRate * 0.04, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
  const src = ac.createBufferSource();
  const ng = ac.createGain();
  const filt = ac.createBiquadFilter();
  filt.type = 'bandpass'; filt.frequency.value = 800; filt.Q.value = 0.8;
  src.buffer = buf;
  ng.gain.setValueAtTime(0.35, t);
  src.connect(filt); filt.connect(ng); ng.connect(ac.destination);
  src.start(t);
}

// ── 2. TYPEWRITER — dot-matrix printer tick per character ──
let typeSoundActive = false;
let typeOscNode = null;

function sfxTypeChar() {
  const ac = getAC();
  const t = ac.currentTime;
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(2400, t);
  gain.gain.setValueAtTime(0.08, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.025);
  osc.connect(gain); gain.connect(ac.destination);
  osc.start(t); osc.stop(t + 0.03);
  const osc2 = ac.createOscillator();
  const g2 = ac.createGain();
  osc2.type = 'sawtooth';
  osc2.frequency.setValueAtTime(220, t);
  g2.gain.setValueAtTime(0.06, t);
  g2.gain.exponentialRampToValueAtTime(0.001, t + 0.02);
  osc2.connect(g2); g2.connect(ac.destination);
  osc2.start(t); osc2.stop(t + 0.025);
}

// ── 3. MATRIX RAIN — sustained eerie digital hiss/drone ──
let rainSoundNodes = [];

function sfxRainStart() {
  const ac = getAC();
  const t = ac.currentTime;

  // White noise filtered to hiss
  const bufLen = ac.sampleRate * 4;
  const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) d[i] = Math.random() * 2 - 1;

  const noise = ac.createBufferSource();
  noise.buffer = buf; noise.loop = true;

  const hpf = ac.createBiquadFilter();
  hpf.type = 'highpass'; hpf.frequency.value = 3000;

  const noiseGain = ac.createGain();
  noiseGain.gain.setValueAtTime(0, t);
  noiseGain.gain.linearRampToValueAtTime(0.12, t + 1.2);

  noise.connect(hpf); hpf.connect(noiseGain); noiseGain.connect(ac.destination);
  noise.start(t);

  // Deep pulsing drone
  const drone = ac.createOscillator();
  const droneGain = ac.createGain();
  drone.type = 'sawtooth';
  drone.frequency.setValueAtTime(55, t);
  drone.frequency.linearRampToValueAtTime(48, t + 3.5);
  droneGain.gain.setValueAtTime(0, t);
  droneGain.gain.linearRampToValueAtTime(0.18, t + 0.8);
  droneGain.gain.linearRampToValueAtTime(0.22, t + 3.0);

  const droneFilter = ac.createBiquadFilter();
  droneFilter.type = 'lowpass'; droneFilter.frequency.value = 200;

  drone.connect(droneFilter); droneFilter.connect(droneGain); droneGain.connect(ac.destination);
  drone.start(t);

  // Mid-range shimmer — cascading resonant filter
  const shimmer = ac.createOscillator();
  const shimGain = ac.createGain();
  shimmer.type = 'sawtooth';
  shimmer.frequency.setValueAtTime(220, t);
  shimmer.frequency.linearRampToValueAtTime(180, t + 3.5);
  shimGain.gain.setValueAtTime(0, t);
  shimGain.gain.linearRampToValueAtTime(0.07, t + 1.0);

  const shimFilter = ac.createBiquadFilter();
  shimFilter.type = 'bandpass'; shimFilter.frequency.value = 600; shimFilter.Q.value = 8;

  shimmer.connect(shimFilter); shimFilter.connect(shimGain); shimGain.connect(ac.destination);
  shimmer.start(t);

  rainSoundNodes = [noise, drone, shimmer, noiseGain, droneGain, shimGain];
}

function sfxRainStop() {
  const ac = getAC();
  const t = ac.currentTime;
  rainSoundNodes.forEach(n => {
    if (n.gain) { n.gain.setValueAtTime(n.gain.value, t); n.gain.linearRampToValueAtTime(0, t + 0.3); }
    else { try { n.stop(t + 0.35); } catch(e) {} }
  });
  rainSoundNodes = [];
}

// ── 4. CRT ZAP — high-voltage electrical discharge ──
function sfxCRTZap() {
  const ac = getAC();
  const t = ac.currentTime;

  // Stop rain sound
  sfxRainStop();

  // Loud electrical zap — high-pitch descending sweep
  const zap = ac.createOscillator();
  const zapGain = ac.createGain();
  zap.type = 'sawtooth';
  zap.frequency.setValueAtTime(8000, t);
  zap.frequency.exponentialRampToValueAtTime(400, t + 0.65);
  zapGain.gain.setValueAtTime(0.0, t);
  zapGain.gain.linearRampToValueAtTime(0.9, t + 0.01);
  zapGain.gain.exponentialRampToValueAtTime(0.001, t + 0.7);

  const zapFilter = ac.createBiquadFilter();
  zapFilter.type = 'bandpass'; zapFilter.frequency.value = 4000; zapFilter.Q.value = 1.5;

  zap.connect(zapFilter); zapFilter.connect(zapGain); zapGain.connect(ac.destination);
  zap.start(t); zap.stop(t + 0.72);

  // Crackle noise burst on top
  const cbuf = ac.createBuffer(1, ac.sampleRate * 0.5, ac.sampleRate);
  const cd = cbuf.getChannelData(0);
  for (let i = 0; i < cd.length; i++) cd[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ac.sampleRate * 0.15));
  const crackle = ac.createBufferSource();
  const crackleGain = ac.createGain();
  crackle.buffer = cbuf;
  crackleGain.gain.setValueAtTime(0.5, t);
  crackle.connect(crackleGain); crackleGain.connect(ac.destination);
  crackle.start(t);

  // High-pitched TV whine fading out
  const whine = ac.createOscillator();
  const whineGain = ac.createGain();
  whine.type = 'sine';
  whine.frequency.setValueAtTime(15600, t + 0.05);
  whine.frequency.linearRampToValueAtTime(12000, t + 0.8);
  whineGain.gain.setValueAtTime(0.3, t + 0.05);
  whineGain.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
  whine.connect(whineGain); whineGain.connect(ac.destination);
  whine.start(t + 0.05); whine.stop(t + 0.95);
}

let usedNames=[];
function getCodename(input){
  const clean=input.trim().toUpperCase().replace(/[^A-Z]/g,'');
  if(!clean)return null;
  for(let i=0;i<clean.length;i++){
    const m=SPYNAMES.find(s=>s.letter===clean[i]&&!usedNames.includes(s.name));
    if(m){usedNames.push(m.name);return m;}
  }
  const fb=SPYNAMES.find(s=>!usedNames.includes(s.name));
  if(fb){usedNames.push(fb.name);return fb;}
  return{name:"Agent X-Unknown",film:"Classified"};
}

function makeBeam(container){
  const el=document.createElement('div');
  const spd=.25+Math.random()*.4,del=Math.random()*.35;
  const g=180+Math.floor(Math.random()*75);
  el.style.cssText=`position:absolute;height:${1+Math.random()*2.5}px;width:120%;left:-110%;border-radius:2px;opacity:0;top:${Math.random()*100}%;transform:rotate(${(Math.random()-.5)*28}deg);transform-origin:left center;background:linear-gradient(90deg,transparent,rgba(0,${g},0,.85),#00ff00,rgba(60,255,60,.9),transparent);box-shadow:0 0 6px #00ff00,0 0 14px #00ff00;animation:lzrScan ${spd}s ${del}s linear forwards;`;

  setTimeout(()=>{if(el.parentNode)el.parentNode.removeChild(el);},(spd+del)*1000+150);

// ── MATRIX RAIN + CRT (all on canvas, no CSS transforms) ──
function triggerMatrixCRT(){
  clearInterval(lzrInt2);
  const canvas=document.getElementById('matrixCanvas');
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const W=window.innerWidth;
  const H=window.innerHeight;
  canvas.width=W*dpr;
  canvas.height=H*dpr;
  canvas.style.width=W+'px';
  canvas.style.height=H+'px';
  ctx.scale(dpr,dpr);
  canvas.classList.add('on');

  const fontSize=Math.max(14,Math.round(W/28));
  const cols=Math.floor(W/fontSize);
  const chars='アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&';
  const drops=Array.from({length:cols},()=>Math.random()*-(H/fontSize));
  const speeds=Array.from({length:cols},()=>0.4+Math.random()*0.8);

  const RAIN_MS=3500,SQUASH_MS=700,HOLD_MS=380,FADE_MS=450;
  const t0=performance.now();
  let phase='rain',phaseStart=t0;
  let snapshot=null,snapCanvas=null;

  function tick(now){
    const elapsed=now-phaseStart;
    if(phase==='rain'){
      const progress=(now-t0)/RAIN_MS;
      const trail=0.045+progress*0.18;
      ctx.fillStyle=`rgba(0,0,0,${Math.min(trail,0.28)})`;
      ctx.fillRect(0,0,W,H);
      ctx.font=`bold ${fontSize}px monospace`;
      for(let i=0;i<cols;i++){
        const char=chars[Math.floor(Math.random()*chars.length)];
        const x=i*fontSize,y=drops[i]*fontSize;
        if(Math.random()>0.93){ctx.shadowBlur=8;ctx.shadowColor='#00ff41';ctx.fillStyle='#ffffff';}
        else{ctx.shadowBlur=0;ctx.shadowColor='transparent';const g=170+Math.floor(Math.random()*85);const a=Math.max(0.08,1-progress*0.55);ctx.fillStyle=`rgba(0,${g},0,${a})`;}
        ctx.fillText(char,x,y);
        if(y>H&&Math.random()>0.975)drops[i]=0;
        drops[i]+=speeds[i];
      }
      ctx.shadowBlur=0;
      if(now-t0>=RAIN_MS){
        snapshot=ctx.getImageData(0,0,W*dpr,H*dpr);
        snapCanvas=document.createElement('canvas');
        snapCanvas.width=W*dpr;snapCanvas.height=H*dpr;
        snapCanvas.getContext('2d').putImageData(snapshot,0,0);
        phase='squash';phaseStart=now;
        sfxCRTZap();
      }
    } else if(phase==='squash'){
      const t=Math.min(elapsed/SQUASH_MS,1);
      const ease=t*t;
      const stripH=Math.max(H*(1-ease),1);
      const y0=(H-stripH)/2;
      ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
      const scaleX=1+ease*0.03;
      const drawW=W*scaleX,drawX=(W-drawW)/2;
      ctx.filter=`brightness(${1+ease*3.5}) saturate(${Math.max(1-ease*1.3,0)})`;
      ctx.drawImage(snapCanvas,drawX,y0,drawW,stripH);
      ctx.filter='none';
      if(t>=1){phase='hold';phaseStart=now;}
    } else if(phase==='hold'){
      ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
      drawLine(ctx,W,H,1);
      if(elapsed>=HOLD_MS){phase='fade';phaseStart=now;}
    } else if(phase==='fade'){
      const t=Math.min(elapsed/FADE_MS,1);
      ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
      drawLine(ctx,W,H,1-t,W*(1-t*0.92));
      if(t>=1){
        canvas.classList.remove('on');
        const blackout=document.createElement('div');
        blackout.style.cssText='position:fixed;inset:0;background:#000;z-index:9999;';
        document.body.appendChild(blackout);
        return;
      }
    }
    requestAnimationFrame(tick);
  }

  function drawLine(ctx,W,H,opacity,lineW){
    if(opacity<=0)return;
    lineW=lineW??W;
    const cx=W/2,cy=H/2,x0=cx-lineW/2,x1=cx+lineW/2;
    ctx.save();ctx.globalAlpha=opacity;
    [[20,0.18],[10,0.3],[5,0.5],[2,1]].forEach(([lw,a],i)=>{
      ctx.beginPath();ctx.moveTo(x0,cy);ctx.lineTo(x1,cy);
      ctx.strokeStyle=`rgba(255,255,255,${a})`;ctx.lineWidth=lw;
      ctx.shadowColor='#ffffff';ctx.shadowBlur=[60,30,14,6][i];ctx.stroke();
    });
    ctx.restore();
  }

  requestAnimationFrame(tick);
}
</script>
</body>
</html>
